<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" role="img" aria-label="explain-openclaw 开发过程海报">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ee" />
      <stop offset="55%" stop-color="#ffe5c8" />
      <stop offset="100%" stop-color="#ffd5c0" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf9" />
      <stop offset="100%" stop-color="#fff1e0" />
    </linearGradient>
    <linearGradient id="chip" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffeddc" />
      <stop offset="100%" stop-color="#ffe0c9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#d5875c" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)" />
  <circle cx="930" cy="202" r="178" fill="#ffcdb6" opacity="0.65" />
  <circle cx="114" cy="1750" r="146" fill="#ffc1ad" opacity="0.45" />
  <circle cx="978" cy="1774" r="118" fill="#ffd9a8" opacity="0.4" />

  <rect x="54" y="52" width="972" height="1816" rx="46" fill="url(#panel)" filter="url(#shadow)" />

  <g transform="translate(94 96)">
    <rect x="0" y="0" width="214" height="54" rx="27" fill="#231815" opacity="0.92" />
    <text x="30" y="36" fill="#fff6ee" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="700">项目开发海报</text>

    <g transform="translate(0 92)">
      <circle cx="106" cy="98" r="46" fill="#f2c29b" />
      <path d="M28 258c0-56 36-100 86-100s86 44 86 100" fill="#2c7a5a" />
      <path d="M60 170c16 14 34 22 52 22 18 0 36-8 52-22" fill="none" stroke="#1f2933" stroke-linecap="round" stroke-width="10" />
      <circle cx="90" cy="92" r="6" fill="#1f2933" />
      <circle cx="122" cy="92" r="6" fill="#1f2933" />
      <path d="M90 120c9 8 23 8 32 0" fill="none" stroke="#d06a5f" stroke-linecap="round" stroke-width="6" />

      <g transform="translate(142 44)">
        <path d="M82 10c58 0 106 47 106 104S140 218 82 218c-37 0-69-17-89-43" fill="#e53935" />
        <circle cx="99" cy="85" r="6" fill="#fff4e3" />
        <path d="M180 64l36-28" fill="none" stroke="#e53935" stroke-linecap="round" stroke-width="10" />
        <path d="M162 42l13-39" fill="none" stroke="#e53935" stroke-linecap="round" stroke-width="10" />
        <path d="M177 134c38-20 64-8 62 18-24 22-58 27-87 13" fill="#e53935" />
        <path d="M151 196c35 28 71 31 94 10-7-31-36-43-71-37" fill="#e53935" />
        <path d="M70 103c18 8 26 26 21 44" fill="none" stroke="#fff4e3" stroke-linecap="round" stroke-width="8" />
      </g>
    </g>

    <text x="0" y="450" fill="#ca5827" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700">把复杂英文文档讲成小朋友也能懂的中文</text>
    <text x="0" y="542" fill="#1f2933" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="88" font-weight="900">explain-openclaw</text>
    <text x="0" y="610" fill="#556270" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="36">https://explain-openclaw.pages.dev</text>

    <g transform="translate(0 654)">
      <rect width="276" height="76" rx="24" fill="url(#chip)" stroke="#efc4a6" />
      <text x="26" y="48" fill="#99491f" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="30" font-weight="700">全球可访问</text>
    </g>
    <g transform="translate(294 654)">
      <rect width="276" height="76" rx="24" fill="url(#chip)" stroke="#efc4a6" />
      <text x="26" y="48" fill="#99491f" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="30" font-weight="700">Cloudflare 免费部署</text>
    </g>
    <g transform="translate(588 654)">
      <rect width="310" height="76" rx="24" fill="url(#chip)" stroke="#efc4a6" />
      <text x="26" y="48" fill="#99491f" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="30" font-weight="700">SEO + AdSense 预留</text>
    </g>

    <g transform="translate(0 782)">
      <rect width="898" height="238" rx="34" fill="#fffaf4" stroke="#f1d7be" />
      <text x="34" y="56" fill="#1f2933" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="800">我们做了什么</text>
      <text x="34" y="108" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="30">1. 保留原站顶部导航和左侧目录结构，顺序尽量一致。</text>
      <text x="34" y="154" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="30">2. 每页生成两层内容：简要总结 + 五岁小孩能听懂的解释版。</text>
      <text x="34" y="200" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="30">3. 重要步骤、命令、前提条件和提醒都保留，不偷懒删教程。</text>
    </g>

    <g transform="translate(0 1050)">
      <rect width="430" height="420" rx="34" fill="#fffaf4" stroke="#f1d7be" />
      <text x="30" y="54" fill="#1f2933" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="800">开发流程</text>
      <text x="30" y="112" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="28">抓取原站首页和 llms-full.txt</text>
      <text x="30" y="158" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="28">整理 10 个主栏目和侧边目录</text>
      <text x="30" y="204" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="28">调用大模型生成中文总结与解释</text>
      <text x="30" y="250" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="28">写入静态页面数据并重新构建</text>
      <text x="30" y="296" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="28">推送 GitHub 交给 Cloudflare 自动部署</text>
      <rect x="30" y="332" width="186" height="54" rx="18" fill="#fff0db" />
      <text x="52" y="367" fill="#a34d22" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="700">303 个页面已生成</text>
    </g>

    <g transform="translate(468 1050)">
      <rect width="430" height="420" rx="34" fill="#fffaf4" stroke="#f1d7be" />
      <text x="30" y="54" fill="#1f2933" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="800">成本优化</text>
      <text x="30" y="112" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="28">默认每 3 天检查一次，不盲目全量跑。</text>
      <text x="30" y="158" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="28">先比对首页签名和文档源签名。</text>
      <text x="30" y="204" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="28">没变化就直接退出，不抓栏目、不调模型。</text>
      <text x="30" y="250" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="28">有变化只重生成变更页面，继续复用缓存。</text>
      <rect x="30" y="318" width="238" height="68" rx="22" fill="#ffe6cf" />
      <text x="60" y="361" fill="#9f4a20" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="800">更省钱，更稳</text>
    </g>

    <g transform="translate(0 1500)">
      <rect width="898" height="212" rx="34" fill="#fffaf4" stroke="#f1d7be" />
      <text x="34" y="56" fill="#1f2933" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="800">安全与发布</text>
      <text x="34" y="108" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="30">敏感内容已隐藏：API Key / Token / 账户名 / 仓库凭证全部不展示。</text>
      <text x="34" y="154" fill="#4e5d69" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="30">公开强调的只有正式网址，方便分享、收录和后续传播。</text>
    </g>

    <g transform="translate(0 1744)">
      <rect width="898" height="90" rx="28" fill="#1f2933" />
      <text x="42" y="58" fill="#fff7ee" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="34" font-weight="700">立即访问: explain-openclaw.pages.dev</text>
    </g>
  </g>
</svg>
